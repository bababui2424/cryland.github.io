<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой стильный профиль</title>
    <style>
        /* Основные стили */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Карточка с эффектом стекла */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            width: 90%;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 { margin: 10px 0; font-size: 2rem; }
        p { opacity: 0.8; line-height: 1.6; }

        /* Кнопки-ссылки */
        .links { margin-top: 25px; }
        .btn {
            display: block;
            background: white;
            color: #764ba2;
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover {
            transform: translateY(-3px);
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Avatar" class="profile-img">
        <h1>Твое Имя</h1>
        <p>Дизайнер, разработчик и просто творческий человек. Создаю крутые штуки на GitHub.</p>
        
        <div class="links">
            <a href="#" class="btn">Мои проекты</a>
            <a href="#" class="btn">Telegram</a>
            <a href="#" class="btn">Instagram</a>
        </div>
    </div>

</body>
</html>
